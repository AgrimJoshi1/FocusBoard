<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - FocusBoard</title>
    <link rel="stylesheet" href="/Create/Create.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="/Get-Started/additional/BGVID.webm" type="video/webm">
</video>

<div class="login-container">
    <div class="login-box">

        <div class="brand-badge"><span>✦ New Account</span></div>

        <h2>Join FocusBoard</h2>
        <p class="subtitle">Create your free account to get started</p>

        <form id="create-form">
            <input type="text" id="username" placeholder="Choose a username" required>
            <input type="email" id="email" placeholder="Enter your email" required>
            <input type="password" id="password" placeholder="Create a password" required>
            <input type="password" id="confirm-password" placeholder="Confirm password" required>

            <button type="submit">Create Account →</button>
        </form>

        <p class="extra">
            Already have an account? <a href="/Login/login.html">Log in</a>
        </p>

    </div>
</div>

<script src="/Create/Create.js"></script>
</body>
</html>
